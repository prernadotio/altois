<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GharKaKhana — Real Home-Cooked Food, Delivered Fresh</title>
    <meta name="description" content="Authentic home-cooked food delivered to your doorstep in Mumbai. Fresh daily, no preservatives." />

    <!-- Fix 1: Preconnect to font origins BEFORE font CSS request -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fix 2: Preconnect to Unsplash for LCP image -->
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Fix 3: Load fonts async with display=swap to unblock render -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Fix 4: Preload the LCP hero image -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200&q=75&fm=webp"
      fetchpriority="high"
      type="image/webp"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
