<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GharKaKhana — Real Home-Cooked Food, Delivered Fresh</title>
    <meta name="description" content="Authentic home-cooked food delivered to your doorstep in Mumbai. Fresh daily, no preservatives." />

    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Non-blocking fonts -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
      media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" />
    </noscript>

    <style>
      /* === BASE === */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{
        --orange:#FF6B2C;--orange-dark:#e55a1c;--cream:#FFF8F0;
        --dark:#1A0A00;--white:#fff;--gray:#888;
        --font-display:'Playfair Display',serif;
        --font-body:'DM Sans',sans-serif;
        --card-shadow:0 8px 32px rgba(255,107,44,0.10);
      }
      html{scroll-behavior:smooth}
      body{font-family:var(--font-body);background:var(--cream);color:var(--dark);line-height:1.6}
      section{padding:80px 0}
      .container{max-width:1140px;margin:0 auto;padding:0 24px}
      .section-title{font-family:var(--font-display);font-size:clamp(2rem,4vw,2.8rem);color:var(--dark);text-align:center;margin-bottom:12px}
      .section-subtitle{text-align:center;color:#5a5a5a;font-size:1.05rem;margin-bottom:48px}

      /* === BUTTONS — #c25217 passes WCAG AA (4.6:1 on white) === */
      .btn{display:inline-flex;align-items:center;gap:6px;padding:14px 36px;border-radius:50px;font-family:var(--font-body);font-weight:500;font-size:1rem;cursor:pointer;border:none;transition:all 0.3s ease;text-decoration:none}
      .btn-primary{background:#c25217;color:#fff}
      .btn-primary:hover{background:#a84412;transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,44,0.35)}
      .btn-outline{background:transparent;color:var(--orange);border:2px solid var(--orange)}
      .btn-outline:hover{background:var(--orange);color:#fff}

      /* === NAVBAR — static shell visible before React mounts === */
      .navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;height:70px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,248,240,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,107,44,0.10);transition:box-shadow 0.3s}
      .navbar.scrolled{box-shadow:0 4px 20px rgba(0,0,0,0.08)}
      .navbar-logo{font-family:var(--font-display);font-size:1.5rem;color:var(--orange);font-weight:900;letter-spacing:-0.5px;text-decoration:none}
      .navbar-logo span{color:var(--dark)}
      .navbar-links{display:flex;list-style:none;gap:32px;align-items:center}
      .navbar-links a{text-decoration:none;color:var(--dark);font-size:0.95rem;font-weight:500;transition:color 0.2s}
      .navbar-links a:hover{color:var(--orange)}
      .navbar-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
      .navbar-hamburger span{width:24px;height:2px;background:var(--dark);border-radius:2px;display:block}

      /* === HERO === */
      .hero{min-height:100vh;background:#1a0a00;display:flex;align-items:center;justify-content:center;padding-top:70px;position:relative;overflow:hidden}
      .hero-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0}
      .hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,10,0,0.80) 0%,rgba(92,45,10,0.55) 100%);z-index:1}
      .hero::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:80px;background:var(--cream);clip-path:ellipse(55% 100% at 50% 100%);z-index:2}
      .hero .container{display:flex;justify-content:center;position:relative;z-index:3}
      .hero-content{max-width:680px;text-align:center;animation:fadeUp 0.9s ease both}
      .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,44,0.18);border:1px solid rgba(255,107,44,0.4);color:#ffb08a;padding:6px 18px;border-radius:50px;font-size:0.85rem;letter-spacing:0.5px;margin-bottom:24px;animation:fadeUp 0.9s 0.1s ease both}
      .hero h1{font-family:var(--font-display);font-size:clamp(2.8rem,6vw,4.5rem);line-height:1.1;color:#fff;margin-bottom:20px;animation:fadeUp 0.9s 0.2s ease both}
      .hero h1 em{color:var(--orange);font-style:normal}
      .hero p{font-size:1.05rem;color:rgba(255,255,255,0.82);margin-bottom:36px;line-height:1.7;animation:fadeUp 0.9s 0.3s ease both}
      .hero-cta{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;animation:fadeUp 0.9s 0.4s ease both}
      .hero-outline-btn{color:#fff!important;border-color:rgba(255,255,255,0.45)!important}
      .hero-stats{display:flex;gap:40px;margin-top:52px;justify-content:center;animation:fadeUp 0.9s 0.5s ease both}
      .hero-stat-num{font-family:var(--font-display);font-size:1.8rem;color:#fff;font-weight:700;line-height:1}
      .hero-stat-label{font-size:0.80rem;color:rgba(255,255,255,0.6);letter-spacing:0.5px;margin-top:4px}
      @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

      /* === MOBILE === */
      @media(max-width:768px){
        section{padding:56px 0}
        .navbar-hamburger{display:flex}
        .navbar-links{position:fixed;top:70px;left:0;right:0;background:var(--cream);flex-direction:column;gap:0;padding:0;max-height:0;overflow:hidden;transition:max-height 0.4s ease;border-bottom:1px solid rgba(255,107,44,0.1)}
        .navbar-links.open{max-height:400px}
        .navbar-links li{width:100%}
        .navbar-links a{display:block;padding:16px 24px;border-bottom:1px solid rgba(0,0,0,0.05)}
      }
      @media(max-width:480px){
        .hero-stats{gap:20px;flex-wrap:wrap}
        .hero-stat-num{font-size:1.4rem}
      }
    </style>
  </head>
  <body>
    <!--
      Static navbar shell — visible INSTANTLY before React mounts.
      This stops navbar-logo from being picked as LCP element.
      React will hydrate/replace this seamlessly.
    -->
    <nav class="navbar" id="static-navbar">
      <a href="#home" class="navbar-logo">GharKa<span>Khana</span></a>
      <button class="navbar-hamburger" aria-label="Open navigation menu" onclick="this.parentNode.querySelector('.navbar-links').classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#menu">Menu</a></li>
        <li><a href="#testimonials">Testimonials</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#contact" class="btn btn-primary" style="padding:8px 22px;font-size:0.9rem">Order Now</a></li>
      </ul>
    </nav>

    <!--
      Static hero shell with LCP image — loads instantly, no React needed.
      React mounts inside #root and takes over below.
    -->
    <section class="hero" id="home" style="margin-top:0">
      <img
        class="hero-bg-img"
        src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=480&q=30&fm=webp"
        alt=""
        aria-hidden="true"
        fetchpriority="high"
        loading="eager"
        decoding="sync"
        width="480"
        height="320"
      />
    </section>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
