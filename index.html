<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GharKaKhana — Real Home-Cooked Food, Delivered Fresh</title>
    <meta name="description" content="Authentic home-cooked food delivered to your doorstep in Mumbai. Fresh daily, no preservatives." />

    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Non-blocking fonts -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" />
    </noscript>

    <!--
      CRITICAL CSS inlined — eliminates the 170ms render-blocking CSS request.
      Only above-the-fold styles: navbar + hero shell.
      Full CSS still loads via the bundle for everything below fold.
    -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{
        --orange:#FF6B2C;--orange-dark:#e55a1c;--cream:#FFF8F0;
        --dark:#1A0A00;--white:#fff;
        --font-display:'Playfair Display',serif;
        --font-body:'DM Sans',sans-serif;
      }
      html{scroll-behavior:smooth}
      body{font-family:var(--font-body);background:var(--cream);color:var(--dark);line-height:1.6}
      .container{max-width:1140px;margin:0 auto;padding:0 24px}
      /* Navbar */
      .navbar{
        position:fixed;top:0;left:0;right:0;z-index:100;
        padding:0 24px;height:70px;
        display:flex;align-items:center;justify-content:space-between;
        background:rgba(255,248,240,0.92);backdrop-filter:blur(12px);
        border-bottom:1px solid rgba(255,107,44,0.10);transition:box-shadow 0.3s;
      }
      .navbar-logo{
        font-family:var(--font-display);font-size:1.5rem;
        color:var(--orange);font-weight:900;letter-spacing:-0.5px;text-decoration:none;
      }
      .navbar-logo span{color:var(--dark)}
      .navbar-hamburger{display:none;cursor:pointer;background:none;border:none;padding:4px}
      /* Hero shell — prevent CLS */
      .hero{
        min-height:100vh;background:#1a0a00;
        display:flex;align-items:center;justify-content:center;
        padding-top:70px;position:relative;overflow:hidden;
      }
      .hero-bg-img{
        position:absolute;inset:0;width:100%;height:100%;
        object-fit:cover;object-position:center;z-index:0;
      }
      /* Buttons */
      .btn{
        display:inline-flex;align-items:center;gap:6px;
        padding:14px 36px;border-radius:50px;
        font-family:var(--font-body);font-weight:500;font-size:1rem;
        cursor:pointer;border:none;transition:all 0.3s ease;text-decoration:none;
      }
      .btn-primary{background:var(--orange);color:var(--white)}
      @media(max-width:768px){
        .navbar-hamburger{display:flex}
        .navbar-links{display:none}
        .navbar-links.open{display:flex;flex-direction:column}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
